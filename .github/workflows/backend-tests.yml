name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          ALLOW_FAKE_REDIS: "1"
          USE_MODAL_REMOTE: "0"
        run: |
          python -m unittest tests/test_api_contract.py tests/test_ingest_service_flows.py tests/test_integration_real_pdf.py
